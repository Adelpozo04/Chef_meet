<!--Pestaña para ver la información de una receta en especifico-->
<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Informacion de Receta</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}" href="/css/custom.css"
        type="text/css" />
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    
    <main class="flex-shrink-0 recipe_wrapper">

        <div class="recipe-detail-container">

            <a href="javascript:history.back()" class="btn-volver"> 
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>
            </a>

            <h1 th:text="${recipe.title}" class="title_xxl border-0 text-center"></h1>

            <p class="recipe-author"
            th:text="${recipe.author != null ? 'Receta de ' + recipe.author.username : 'Autor desconocido'}">
                Receta de usuario
            </p>

            <div class="recipe-hero">
                <div class="text-center">
                    <img class="main_image" 
                        th:src="@{/recipe/{id}/pic/cover(id=${recipe.id})}"  
                        alt="Imagen de la receta">
                </div>

                <div class="recipe-info-card">
                    <h3>Datos generales</h3>

                    <p th:text="'Tiempo de preparación: ' + ${recipe.time}"></p>
                    <p th:text="'Nivel de dificultad: ' + ${recipe.difficulty}"></p>

                    <h3>Alergias</h3>
                    <p th:if="${#sets.isEmpty(recipe.allergens)}">Sin alérgenos indicados.</p>
                    <p th:each="allergen : ${recipe.allergens}" th:text="${allergen}"></p>

                    <h3>Calorías</h3>
                    <p th:text="${recipe.calories}"></p>

                    <h3>Valoración</h3>
                    <div class="d-flex flex-row gap-3">
                        <p id="ratingNumber" th:text="${recipe.averageRating}"></p>

                        <div class="star-rating upElement" id="star-rating">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="recipe-content-grid">
                <div class="recipe-panel">
                    <h3>Ingredientes</h3>

                    <ul>
                        <li th:each="ingredient : ${recipe.recipeIngredients}">
                            <span th:text="${ingredient.ingredientUsed.name}"></span>
                            <span th:text="${ingredient.quantity}"></span>
                        </li>
                    </ul>
                </div>

                <div class="recipe-panel">
                    <h3>Elaboración</h3>

                    <div class="recipe-steps-list">
                        <div th:each="step, iterStat : ${recipe.steps}" class="recipe-step-item">
                            <img class="recipe-step-image" 
                                th:src="@{/recipe/{id}/pic/step{index}(id=${recipe.id}, index=${iterStat.index})}"
                                alt="Imagen del paso">

                            <div class="recipe-step-text">
                                <h4 th:text="'Paso ' + ${iterStat.count}"></h4>
                                <p th:text="${step}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
    
    <script th:src="@{/js/recipeInfo.js}"></script>
    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
