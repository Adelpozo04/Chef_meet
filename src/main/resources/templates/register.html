<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Registro</title>
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container">
            <form class="form-signin" method="post" th:action="@{/register}" th:object="${user}">
                <h2 class="form-signin-heading">Crear cuenta</h2>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="form-group mb-3">
                    <label for="username">Nombre de usuario (*)</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Nombre de usuario" required="required">
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName">Nombre</label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-control" placeholder="Tu nombre" required="required">
                    </div>
                    <div class="col-md-6">
                        <label for="lastName">Apellidos</label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-control" placeholder="Tus apellidos" required="required">
                    </div>
                </div>

                <div class="form-group mb-3">
                    <label for="password">Contraseña (*)</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Mínimo 8 caracteres" required="required" minlength="8">
                </div>

                <div class="form-group mb-4">
                    <label for="pass2" class="visually-hidden">Repetir contraseña (*)</label>
                    <input type="password" id="pass2" name="pass2" class="form-control" placeholder="Vuelve a escribir la contraseña" required="required" minlength="8">
                </div>

                <button class="btn btn-lg btn-primary btn-block" type="submit">Completar Registro</button>

                <div class="mt-3 text center">
                    <p>¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión</a></p>
                </div>
            </form>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
