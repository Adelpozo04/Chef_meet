<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Reserva de Evento</title>
    <link rel="stylesheet" th:href="@{/css/reserve.css}" href="css/reserve.css"/>
    <script th:src="@{/js/reserve.js}"></script>
</head>

<body class="d-flex flex-column h-100">     
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container container-reserva">
            <!-- Boton para volver -->
            <a href="javascript:history.back()" class="btn-volver"> 
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>
            </a>
            <div class="row">
                <div class="col-md-4">
                    <!-- Imagen del evento -->
                    <img th:src="@{${event.imagePath != null ? event.imagePath : 'img/events/default.jpg'}}" class="img-evento mb-4" alt="Imagen del evento">

                    <!-- Información del evento -->
                    <div class="box-rounded text-center">
                        <p class="mb-1" th:text="'Precio: ' + ${event.price} + '€'"></p>
                        <p th:text="'Disponibles: ' + ${availableSpots} + '/' + ${event.capacity}"></p>
                        <!-- Boton para reservar -->
                        <form th:action="@{/reserve/confirm}" method="post">
                            <input type="hidden" name="eventId" th:value="${event.id}">
                            <button type="submit" class="btn btn-reservar" 
                                    th:disabled="${availableSpots <= 0}"
                                    th:data-price="${event.price}">
                                Reservar
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Descripción del evento -->
                <div class="col-md-8">
                    <div class="box-rounded h-100">
                        <h2 class="fw-bold" th:text="${event.title}"></h2>
                        <span class="badge bg-secondary mb-3" th:text="${event.theme}"></span>

                        <div class="mt-4">
                            <p><i class="fa-regular fa-calendar"></i>Fecha: 
                                <span th:text="${#temporals.format(event.date, 'dd/MM/yyyy')}"></span>
                            </p>
                            <p><i class="fa-regular fa-clock"></i>Hora: 
                                <span th:text="${#temporals.format(event.date, 'HH:mm')}"></span>
                            </p>
                            <p><i class="fa-solid fa-location-dot"></i>Lugar: 
                                <span th:text="${event.location}"></span>
                            </p>
                        </div>
                        <hr>
                        <h4>Descripción del evento</h4>
                        <p th:text="${event.description}"></p>
                    </div>
                </div>
            </div>  
        </div>
    </main>
    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>
</html>
