<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Receta</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}" href="/css/custom.css"
        type="text/css" />
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0 column-gap-3 row-gap-5 recipe_wrapper">
        
        <template id="imageUploadTemplate">
 
            <!-- Marco visual Bootstrap -->
            <div class="image-wrapper">
                <label class="d-flex flex-column align-items-center justify-content-center empty_image" 
                style="cursor:pointer;">

                    <!-- Input oculto -->
                    <input type="file" name="stepPhotos" accept="image/*" class="empty_image_input">

                    <span>Pulsa para subir imagen</span>

                </label>

                <!-- Imagen de vista previa -->
                <div>
                    <img class="main_image d-none" name="imageRecipePreview" >
                </div>
            </div>
            

        </template>

        <form th:action="@{/recipe/create}" th:object="${recipe}" enctype="multipart/form-data" method="post" class="mt-4">

            <!--Apartado principal principal de la receta-->
            <div class="d-flex flex-column align-items-center">

                <!-- Titulo -->
                <input th:field="*{title}" class="title_xxl border-0 text-center">
        
                <!-- Marco visual Bootstrap -->
                <label class="d-flex flex-column align-items-center justify-content-center empty_image" 
                style="cursor:pointer;">

                    <!-- Input oculto -->
                    <input type="file" name="cover" accept="image/*" class="empty_image_input">

                    <span>Pulsa para subir imagen</span>

                </label>

                <!-- Imagen de vista previa -->
                <div>
                    <img class="main_image d-none" name="imageRecipePreview" >
                </div>        
                
            </div>

            <div>
                <h3>Datos Generales</h3>

                <div for="time" class="d-flex flex-row ml-3">
                    <p>Tiempo de preparación:  </p>

                    <!-- Tiempo de preparacion -->
                    <input th:field="*{time}" class="title_m border-0 text-left">
                </div>

                <div for="difficulty" class="d-flex flex-row">
                    <p>Nivel de dificultad:  </p>

                    <!-- Nivel de dificultad -->
                    <input th:field="*{difficulty}" class="title_m border-0 text-left">
                </div>

            </div>

            <!--Ingredientes de la receta-->
            <div>
                <h3>Ingredientes</h3>
                <ul class="list_disc" id="ingredientsList">

                </ul>

                <button class="category_item" type="button" id="addIngredient">
                    Añadir Ingrediente
                </button>

                
            </div>

            <!--Pasos para elaborar la receta-->
            <div>
                <h3>Elaboración</h3>
                <ol id="stepsList">


                </ol>
                <button class="category_item" type="button"id="addStep">
                    Añadir Paso
                </button>

            </div>

            <div>
                <h3>Calorías</h3>

                <div for="calories" class="d-flex flex-row ml-3">
                    <!-- Calorías -->
                    <input th:field="*{calories}" class="title_m border-0 text-left">
                </div>

            </div>

            <div>
                <h3>Receta Pública</h3>
                <label>
                    <input type="checkbox" th:field="*{publicRecipe}">
                    Pública
                </label>
            </div>

            <button type="submit" class="category_item" id="create-button">Crear Receta</button>
        </form>

        

    </main>
    
    <script th:src="@{/js/recipe.js}"></script>
    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
