<!-- Pestaña que sirve para rellenar los datos de una receta con el objetivo de crearla-->
<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Receta</title>
    <link rel="stylesheet" th:href="@{/css/custom.css}" href="/css/custom.css"
        type="text/css" />
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0 column-gap-3 row-gap-5 recipe_wrapper">
        
        <!-- Base para la generacion de imagenes en los steps-->
        <template id="imageUploadTemplate">
 
            <!-- Marco visual Bootstrap -->
            <div class="image-wrapper">
                <label class="d-flex flex-column align-items-center justify-content-center empty_image" 
                style="cursor:pointer;">

                    <!-- Input oculto -->
                    <input type="file" name="stepPhotos" accept="image/*" class="empty_image_input">

                    <!-- Texto visible en el cuadro gris de subida de imagenes-->
                    <span>Pulsa para subir imagen</span>

                </label>

                <!-- Imagen de vista previa, en este caso es un cuadro gris marcado por el CSS -->
                <div>
                    <img class="main_image d-none" name="imageRecipePreview" >
                </div>
            </div>
            

        </template>

        <form th:action="@{/recipe/create}" th:object="${recipe}" enctype="multipart/form-data" method="post" class="mt-4">

            <!--Apartado principal principal de la receta-->
            <div class="d-flex flex-column align-items-center">

                <!-- Titulo -->
                <input th:field="*{title}" id="recipe-title" class="title_xxl border-0 text-center">
        
                <!-- Marco visual Bootstrap -->
                <label class="d-flex flex-column align-items-center justify-content-center empty_image" 
                style="cursor:pointer;">

                    <!-- Input oculto, es el que recoge el JS para la subida de imagenes -->
                    <input type="file" id="recipe-cover" name="cover" accept="image/*" class="empty_image_input">

                    <!-- Texto visible en el cuadro gris de subida de imagenes-->
                    <span>Pulsa para subir imagen</span>

                </label>

                <!-- Imagen de vista previa, en este caso es un cuadro gris marcado por el CSS -->
                <div>
                    <img class="main_image d-none" name="imageRecipePreview" >
                </div>        
                
            </div>

            <!--Datos generales de la receta, son inputs de texto simples-->
            <div>
                <h3>Datos Generales</h3>

                <div for="time" class="d-flex flex-row ml-3">
                    <p>Tiempo de preparación:  </p>

                    <!-- Tiempo de preparacion -->
                    <input th:field="*{time}" id="recipe-time" class="title_m border-0 text-left">
                </div>

                <div for="difficulty" class="d-flex flex-row">
                    <p>Nivel de dificultad:  </p>

                    <!-- Nivel de dificultad -->
                    <input th:field="*{difficulty}" id="recipe-difficulty" class="title_m border-0 text-left">
                </div>

            </div>

            <!--Ingredientes de la receta-->
            <div>
                <h3>Ingredientes</h3>

                <!-- La lista es rellenada creando elementos dinamicamente, esto en el JS de recipe.js-->
                <ul class="list_disc" id="ingredientsList">

                </ul>

                <!-- Boton para añadir ingrediente, este activa la funcionalidad en el JS que registra el click-->
                <button class="category_item" type="button" id="addIngredient">
                    Añadir Ingrediente
                </button>

                
            </div>

            <!--Pasos para elaborar la receta-->
            <div>
                <h3>Elaboración</h3>

                <!-- La lista es rellenada creando elementos dinamicamente, esto en el JS de recipe.js-->
                <ol id="stepsList">


                </ol>

                <!-- Boton para añadir paso, este activa la funcionalidad en el JS que registra el click-->
                <button class="category_item" type="button"id="addStep">
                    Añadir Paso
                </button>

            </div>

            <!--Especificación de las calorias, un input de texto normal-->
            <div>
                <h3>Calorías</h3>

                <div for="calories" class="d-flex flex-row ml-3">
                    <!-- Calorías -->
                    <input th:field="*{calories}" id="recipe-calories" class="title_m border-0 text-left">
                </div>

            </div>

            <!--Checkbox que marca si la receta es publica o no. Esto marca la visibilidad en la pestaña de recetas-->
            <div>
                <h3>Receta Pública</h3>
                <label>
                    <input type="checkbox" th:field="*{publicRecipe}" id="recipe-public">
                    Pública
                </label>
            </div>

            <!-- Boton para enviar el formulario y crear la receta, este envia toda la informacion al backend para su procesamiento-->
            <button type="submit" class="category_item" id="create-button">Crear Receta</button>
        </form>

        

    </main>
    
    <!-- JS para la creacion de la receta, se encarga de subida de imagenes y creacion de pasos e ingredientes de forma dinamica.-->
    <script th:src="@{/js/recipe.js}"></script>
    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
