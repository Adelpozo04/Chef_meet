<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Login</title>
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container">
            <form class="form-signin" method="post" th:action="@{/login}">
                <h2 class="form-signin-heading">Inicia sesión, por favor</h2>
                <p th:if="${loginError != false}" class="error">
                    Error en nombre de usuario o contraseña
                </p>
                <p>
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Nombre de usuario" required="required">
                </p>
                <p>
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Contraseña" required="required">
                </p>
                <button class="btn btn-lg btn-primary btn-block" type="submit">Iniciar sesión</button>

                <div class="mt-3 text center">
                    <p>¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a></p>
                </div>

                <div th:if="${param.registered}" class="alert alert-success mt-3" role="alert">
                    ¡Cuenta creada con éxito! Ya puedes iniciar sesión.
                </div>
            </form>
        </div>
    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>

</html>
