<!DOCTYPE html>
<html lang="en">
<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <link rel="stylesheet" th:href="@{/css/communities.css}" href="/css/communities.css"
        type="text/css"/>
    <title th:text="${community.title}">Nombre de la comunidad</title>
</head>
<body>

    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <div class="community-header">
        <div class="community-controls-title">
            <div class="community-buttons">
                
                <!-- Boton para volver -->
                <a href="javascript:history.back()" class="btn-volver"> 
                    <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                    </svg>
                </a>
                
                <th:block th:if="${!isMember and !isOwner}">
                    <form th:action="@{/communities/{id}/add(id=${community.id})}" method="post">
                        <button type="submit">Unirse a la comunidad</button>
                    </form>
                </th:block>

                <th:block th:if="${isMember}">
                    <form th:action="@{/communities/{id}/remove(id=${community.id})}" method="post">
                        <button type="submit">Salirse de la comunidad</button>
                    </form>
                </th:block>
                
                <th:block th:if="${isOwner or isAdmin}">
                    <form th:action="@{/communities/{id}/delete(id=${community.id})}" method="post">
                        <button type="submit">Eliminar comunidad</button>
                    </form>
                </th:block>

                
            </div>

            <div class="community-title">
                <h1 th:text="${community.title}">Título de la comunidad</h1>
                <p class="community-category" th:utext="|${community.country.countryName} ${community.country.emoji}|"></p>
            </div>
        </div>
        
        <div class="community-desc">
            <p th:text="${community.description}">Descripción de la comunidad</p>
        </div>
    </div>

    <main class="community-info">

        <div class="community-members">
            <h2>Miembros</h2>
            <ul class="community-members-list">
                
                <li class="community-creator">
                    <p th:text="'Creador: ' + ${owner.username}">Creador</p>
                </li>

                <hr>

                <li th:each="member : ${members}" th:if="${member.id != owner.id}" class="community-member">
                    <p th:text="${member.username}">Miembro</p>
                </li>

            </ul>
        </div>

        <div class="community-posts">
            <h2>Publicaciones</h2>
            <ul class="community-posts-list">
                <li>
                    <p> Una publicación </p>
                </li>
                <li>
                    <p> Otra publicación </p>
                </li>
            </ul>
        </div>

        <div class="community-events">
            <div class="events-header">
                <h2 class="events-title">Eventos</h2>
                <a th:if="${isMember or isOwner}" th:href="@{/event/create(communityId=${community.id})}" class="btn btn-sm btn-primary">
                    + Crear evento
                </a>
            </div>
            
            <h4 class="events-subtitle upcoming">Próximos</h4>
            <ul class="community-events-list">
                <li th:each="ev: ${upcomingEvents}" class="event-item">
                    <a th:href="@{/reservation/{id}(id=${ev.id})}" th:text="${ev.title}" class="event-link dark"></a>
                    <span th:text="${#temporals.format(ev.date, ' (dd/MM/yy)')}" class="event-date"></span>
                    <span th:if="${ev.isPrivate()}" class="badge-private">Privado</span>
                </li>
                <li th:if="${#lists.isEmpty(upcomingEvents)}" class="event-empty">No hay eventos proximamente.</li>
            </ul>

            <h4 class="events-subtitle past">Pasados</h4>
            <ul class="community-events-list">
                <li th:each="ev: ${pastEvents}" class="event-item">
                    <a th:href="@{/reservation/{id}(id=${ev.id})}" th:text="${ev.title}" class="event-link light"></a>
                </li>
                <li th:if="${#lists.isEmpty(pastEvents)}" class="event-empty">No hay eventos pasados.</li>
            </ul>
        </div>

    </main>
    
    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>
</html>
