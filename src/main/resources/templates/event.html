<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>IW: Evento</title>

    <link rel="stylesheet" th:href="@{/css/custom.css}" href="css/custom.css"/>

    <script th:src="@{/js/event.js}"></script>
    <script async defer th:src="|https://maps.googleapis.com/maps/api/js?key=${googleMapsKey}&callback=initMap|"></script>
</head>

<body class="d-flex flex-column h-100">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="flex-shrink-0">
        <div class="container py-5">

            <h1>Explora eventos</h1>

            <div th:if="${errorFull}" class="alert alert-danger alert-dismissible fade show text-center" role="alert">
                <strong>¡Lo sentimos!</strong> El evento al que has intentado apuntarte ya no tiene plazas disponibles.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div id="map"></div>

            <!-- Barra de busqueda de bootstrap -->
            <div class="row justify-content-center mb-4">
                <div class="col-md-6">
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Buscar eventos..." aria-label="Search"/>
                        <button class="btn btn_search" type="submit">Buscar</button>
                    </form>
                </div>
            </div>
            

            
            <div th:if="${session.u}" class="d-flex justify-content-center mb-4">
                <a th:href="@{event/create}" class="category_item">Crear evento</a>
            </div>

            <!-- Filtros -->
            <div class="explorer_wrapper">

                <section th:if="${session.u}" class="events-list">
                        
                    <details open>
                        <summary class="events-dropdown"> Mis eventos </summary>

                        <div th:if="${#lists.isEmpty(myEvents)}" class="no-events">
                            <p>Aún no te has a puntado a ningún evento. ¡Únete a uno o crea el tuyo propio!</p>
                        </div>

                        <div th:if="${!#lists.isEmpty(myEvents)}" class="cards_list mt-3">
                            <div class="card_item" th:each="ev: ${myEvents}">
                                
                                <a th:href="@{/reserve/{id}(id=${ev.id})}" class="card_link">
                                    <img th:src="@{${ev.imagePath != null ? ev.imagePath: '/img/events/default.jpg'}}" alt="Imagen del evento">
                                    <span class="card_footer" th:text="${ev.title}">Título</span>
                                </a>
                                <form th:if="${session.u != null && session.u.hasRole('ADMIN')}"
                                      th:action="@{/event/{id}/delete(id=${ev.id})}" method="post">
                                    <button type="submit" class="btn btn-danger btn-sm mt-2 btn_delete">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
                                            <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
                                        </svg>
                                    </button>
                                </form> 
                            </div>
                        </div>
                    </details>
                </section>

                <section class="events-list">
                         
                    <details open>
                        <summary class="events-dropdown"> Otros eventos</summary>
                        <div th:if="${#lists.isEmpty(otherEvents)}" class="no-events">
                            <p>No hay otros eventos disponibles en este momento.</p>
                        </div>

                        <div th:if="${!#lists.isEmpty(otherEvents)}" class="cards_list mt-3">
                            <div class="card_item" th:each="ev: ${otherEvents}">
                                
                                <a th:href="@{/reserve/{id}(id=${ev.id})}" class="card_link">
                                    <img th:src="@{${ev.imagePath != null ? ev.imagePath: '/img/events/default.jpg'}}" alt="Imagen del evento">
                                    <span class="card_footer" th:text="${ev.title}">Título</span>
                                </a>

                                <form th:if="${session.u != null && session.u.hasRole('ADMIN')}"
                                      th:action="@{/event/{id}/delete(id=${ev.id})}" method="post">
                                    <button type="submit" class="btn btn-danger btn-sm mt-2 btn_delete">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
                                            <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
                                        </svg>
                                    </button>
                                </form> 
                            </div>
                        </div>
                    </details>
                </section>

            </div>
        </div>  
    </main>
    
    <th:block th:replace="~{fragments/footer.html :: footer}" />
</body>
</html>
