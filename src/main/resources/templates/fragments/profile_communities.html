<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <div th:fragment="communities">
        <h2>Mis comunidades</h2>

        <p th:if="${#lists.isEmpty(myCreatedCommunities) and #lists.isEmpty(myJoinedCommunities)}">Interactua con comunidades creadas por los usuarios!</p>

        <!-- Cards lista de communidades creadas -->
        <section class="cards_list" th:unless="${#lists.isEmpty(myCreatedCommunities) and #lists.isEmpty(myJoinedCommunities)}">
            <div class="card_item" th:each="comm: ${myCreatedCommunities}">
                <a class="event-card" th:href="@{/communities/{id}(id=${comm.id})}">
                    <div 
                    class="event-card_background"
                    th:style="'background-image: url(' + @{/img/communities/default.png} + ')'"></div>

                    <div class="event-card_content">
                        <h3 class="event-card_title" th:text="${comm.title}"></h3>
                    </div>
                </a>
            </div>

            <div class="card_item" th:each="comm: ${myJoinedCommunities}">
                <a class="event-card" th:href="@{/communities/{id}(id=${comm.id})}">
                    <div 
                    class="event-card_background"
                    th:style="'background-image: url(' + @{/img/communities/default.png} + ')'"></div>
                    
                    <div class="event-card_content">
                        <h3 class="event-card_title" th:text="${comm.title}"></h3>
                    </div>
                </a>
            </div>
        </section>

    </div>
</body>
