<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <div th:fragment="events">
    <h2>Mis eventos</h2>
     <p th:if="${#lists.isEmpty(myEvents)}">Aún no te has apuntado a ningún evento.</p>

    <!-- Cards lista de eventos -->
                <section class="cards_list" th:unless="${#lists.isEmpty(myEvents)}">
                    <div class="card_item" th:each="ev: ${myEvents}">
                        <a class="event-card" th:href="@{/reservation/{id}(id=${ev.id})}">
                            <div class="event-card_background"
                                    th:style="'background-image: url(' + @{${ev.imagePath != null ? ev.imagePath : '/img/events/default.jpg'}} + ')'"></div>
                            <div class="event-card_content">
                                <h3 class="event-card_title" th:text="${ev.title}"></h3>

                                <div class="event-card_details">
                                    <p class="event-card_theme" th:text="${ev.theme}"></p>
                                    <p class="event-card_date" th:text="${#temporals.format(ev.date, 'dd/MM/yyyy')}"></p>
                                </div>
                            </div>
                        </a>
                    </div>
                </section>
    </div>
</body>
</html>
